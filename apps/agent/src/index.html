<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chronos Sentinel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app-container">
      <div id="loading-state" class="state-view active">
        <div class="spinner"></div>
        <p>Initializing Sentinel...</p>
      </div>

      <div id="pairing-state" class="state-view">
        <h1>Link Device</h1>
        <p>Enter this code on your Command Center dashboard:</p>
        <div class="code-box">
          <span id="pairing-code">------</span>
        </div>
        <div class="pulse-wait">
          <div class="dot"></div>
          <span>Waiting for confirmation...</span>
        </div>
      </div>

      <div id="active-state" class="state-view">
        <div class="success-icon">✓</div>
        <h1>Monitoring Active</h1>
        <p>This device is securely paired and streaming telemetry.</p>
        <button id="minimize-btn">Hide Window</button>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
